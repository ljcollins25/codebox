<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocuSign PDF Annotator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ===== CSS Custom Properties ===== */
:root {
  --bg-primary: #f8f9fb;
  --bg-secondary: #ffffff;
  --bg-canvas: #e8eaee;
  --text-primary: #1a1d24;
  --text-secondary: #4a5263;
  --text-muted: #8891a8;
  --accent: #4f46e5;
  --accent-hover: #4338ca;
  --accent-light: rgba(79,70,229,0.1);
  --border: #d1d5db;
  --border-light: #e5e7eb;
  --danger: #dc2626;
  --danger-hover: #b91c1c;
  --overlay: rgba(26,29,36,0.5);
}
.dark {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d24;
  --bg-canvas: #13151c;
  --text-primary: #f0f2f5;
  --text-secondary: #b4b9c5;
  --text-muted: #6b7280;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-light: rgba(99,102,241,0.15);
  --border: #2d3139;
  --border-light: #23262e;
  --danger: #ef4444;
  --danger-hover: #f87171;
  --overlay: rgba(0,0,0,0.7);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow: hidden; }

/* ===== Scrollbar (WebKit) ===== */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Toolbar ===== */
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 60px; display: flex; align-items: center; gap: 6px;
  padding: 0 16px; background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-light);
  overflow-x: auto; overflow-y: hidden;
}
.toolbar .brand {
  font-family: 'Merriweather', serif; font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap; user-select: none;
}
.toolbar .divider {
  width: 1px; height: 28px; background: var(--border-light); flex-shrink: 0;
}
.toolbar .spacer { flex: 1; min-width: 8px; }

.toolbar button, .toolbar .tb-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg-secondary); color: var(--text-secondary);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: all .15s;
  flex-shrink: 0;
}
.toolbar button:hover:not(:disabled) { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.toolbar button:disabled { opacity: 0.45; cursor: not-allowed; }
.toolbar button.accent-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbar button.accent-btn:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
.toolbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbar button i { font-size: 14px; }

/* ===== PDF Viewer ===== */
.pdf-viewer {
  position: absolute; top: 60px; left: 0; right: 0; bottom: 0;
  overflow: auto; background: var(--bg-canvas); padding: 24px;
}
.pdf-container {
  display: flex; flex-direction: column; align-items: center; gap: 24px;
  padding-bottom: 40px;
}

/* Empty state */
.empty-state {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; user-select: none; pointer-events: none;
}
.empty-state i { font-size: 80px; color: var(--text-muted); opacity: 0.35; margin-bottom: 20px; }
.empty-state h2 { font-size: 22px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--text-muted); opacity: 0.7; }

/* ===== PDF Page ===== */
.pdf-page-wrapper { display: flex; flex-direction: column; align-items: center; }
.pdf-page {
  position: relative; background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.10);
  border-radius: 4px; overflow: hidden;
}
.pdf-canvas { display: block; }
.annotation-layer {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}
.page-label {
  margin-top: 8px; padding: 3px 12px; border-radius: 12px;
  background: var(--bg-secondary); border: 1px solid var(--border-light);
  color: var(--text-muted); font-size: 12px; font-weight: 500; user-select: none;
}

/* ===== Annotation ===== */
.annotation {
  position: absolute; border: 2px solid var(--accent); border-radius: 6px;
  background: transparent; pointer-events: auto; z-index: 10;
  transition: box-shadow .15s;
}
.annotation.selected { box-shadow: 0 0 0 3px var(--accent-light); z-index: 20; }
.annotation.dragging { cursor: grabbing; opacity: 0.88; z-index: 30; }

.annotation-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3px 8px; background: var(--accent-light); cursor: grab;
  border-bottom: 1px solid var(--accent-light); border-radius: 4px 4px 0 0;
  user-select: none; min-height: 28px;
}
.annotation-header span {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; color: var(--accent);
  pointer-events: none;
}
.annotation-header span i { font-size: 11px; }
.annotation-actions { display: flex; gap: 2px; }
.ann-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border: none; border-radius: 4px;
  background: transparent; color: var(--accent); cursor: pointer;
  font-size: 11px; transition: background .12s, color .12s;
}
.ann-btn:hover { background: var(--accent-light); }
.ann-btn.del-btn:hover { background: rgba(220,38,38,0.1); color: var(--danger); }

/* Text annotation */
.text-content {
  padding: 6px 8px; outline: none; font-size: 16px; line-height: 1.4;
  color: #1a1d24; font-family: 'Inter', sans-serif; background: transparent;
  min-height: 24px; word-break: break-word; cursor: text;
  overflow: hidden;
}
.text-content:empty::before {
  content: 'Type here…'; color: #aaa; pointer-events: none;
}

/* Signature annotation */
.sign-area {
  position: relative; flex: 1; display: flex; background: transparent;
  overflow: hidden;
}
.sign-area canvas { display: block; cursor: crosshair; touch-action: none; }
.sign-placeholder {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 13px; color: var(--text-muted); pointer-events: none; user-select: none;
  white-space: nowrap;
}
.sign-clear {
  position: absolute; bottom: 4px; right: 6px; padding: 2px 8px;
  border: 1px solid var(--border); border-radius: 4px; background: var(--bg-secondary);
  color: var(--text-secondary); font-size: 11px; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all .12s;
}
.sign-clear:hover { border-color: var(--danger); color: var(--danger); }

/* Resize handle */
.resize-handle {
  position: absolute; bottom: 0; right: 0; width: 16px; height: 16px;
  cursor: nwse-resize; z-index: 5;
}
.resize-handle::after {
  content: ''; position: absolute; bottom: 3px; right: 3px;
  width: 8px; height: 8px;
  border-right: 2px solid var(--accent); border-bottom: 2px solid var(--accent);
  opacity: 0.5;
}

/* ===== Preview Mode ===== */
.preview-mode .annotation { border-color: transparent; box-shadow: none; cursor: default; pointer-events: none; }
.preview-mode .annotation-header { display: none; }
.preview-mode .resize-handle { display: none; }
.preview-mode .sign-clear { display: none; }
.preview-mode .sign-placeholder { display: none; }
.preview-mode .text-content::before { content: ''; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500; background: var(--overlay);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 12px; width: 90%; max-width: 520px; max-height: 80vh;
  display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,0.25);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border-light);
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close {
  width: 30px; height: 30px; border: none; border-radius: 6px;
  background: transparent; color: var(--text-muted); cursor: pointer;
  font-size: 16px; display: inline-flex; align-items: center; justify-content: center;
  transition: background .12s;
}
.modal-close:hover { background: var(--accent-light); color: var(--text-primary); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  display: flex; gap: 8px; justify-content: flex-end;
  padding: 14px 20px; border-top: 1px solid var(--border-light);
}
.modal-btn {
  padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg-secondary); color: var(--text-secondary);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.modal-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.modal-btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.modal-btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.modal-btn-danger:hover { background: var(--danger-hover); border-color: var(--danger-hover); }

/* Library items in modal */
.library-list { display: flex; flex-direction: column; gap: 8px; }
.library-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border: 1px solid var(--border-light); border-radius: 8px;
  background: var(--bg-primary);
}
.library-item .lib-badge {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  background: var(--accent-light); color: var(--accent); flex-shrink: 0;
}
.library-item .lib-preview { flex: 1; font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.library-item button {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-secondary); color: var(--text-secondary); font-size: 12px;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all .12s; flex-shrink: 0;
}
.library-item button:hover { border-color: var(--accent); color: var(--accent); }
.library-item button.lib-del:hover { border-color: var(--danger); color: var(--danger); }
.library-empty { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }

/* Import merge modal textarea */
.modal-body textarea {
  width: 100%; min-height: 120px; padding: 10px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg-primary); color: var(--text-primary);
  font-family: 'Inter', monospace; font-size: 13px; resize: vertical;
}

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  padding: 10px 24px; border-radius: 24px; background: var(--bg-secondary);
  border: 1px solid var(--border); color: var(--text-primary);
  font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 600;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .toolbar { padding: 0 8px; gap: 4px; }
  .toolbar .brand { font-size: 16px; }
  .toolbar button .label { display: none; }
  .toolbar button { padding: 7px 10px; }
  .pdf-viewer { padding: 10px; }
}
</style>
</head>
<body>

<!-- Hidden file inputs -->
<input type="file" id="file-input" accept=".pdf" hidden/>
<input type="file" id="yaml-input" accept=".yaml,.yml" hidden/>

<!-- Toolbar -->
<div class="toolbar">
  <div class="brand">DocuSign</div>
  <div class="divider"></div>
  <button id="btn-open" class="accent-btn"><i class="fas fa-folder-open"></i><span class="label">Open PDF</span></button>
  <div class="divider"></div>
  <button id="btn-text" disabled><i class="fas fa-font"></i><span class="label">Text</span></button>
  <button id="btn-sign" disabled><i class="fas fa-signature"></i><span class="label">Sign</span></button>
  <button id="btn-date" disabled><i class="fas fa-calendar-day"></i><span class="label">Date</span></button>
  <div class="divider"></div>
  <button id="btn-dup" disabled><i class="fas fa-clone"></i><span class="label">Duplicate</span></button>
  <button id="btn-save" disabled><i class="fas fa-bookmark"></i><span class="label">Save</span></button>
  <button id="btn-library"><i class="fas fa-book"></i><span class="label">Library</span></button>
  <div class="divider"></div>
  <button id="btn-export" disabled><i class="fas fa-file-export"></i><span class="label">Export Ann.</span></button>
  <button id="btn-import"><i class="fas fa-file-import"></i><span class="label">Import Ann.</span></button>
  <div class="divider"></div>
  <button id="btn-preview"><i class="fas fa-eye"></i><span class="label">Preview</span></button>
  <div class="spacer"></div>
  <button id="btn-download" disabled class="accent-btn"><i class="fas fa-download"></i><span class="label">Download</span></button>
</div>

<!-- Main viewer -->
<div class="pdf-viewer" id="pdf-viewer">
  <div class="empty-state" id="empty-state">
    <i class="fas fa-file-pdf"></i>
    <h2>No PDF Loaded</h2>
    <p>Click "Open PDF" to get started with annotations and signatures.</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   DocuSign PDF Annotator — Full SPA Logic
   ========================================================= */

// PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ——— State ———
let pdfDoc = null;
let pdfFileName = '';
const pdfPageViewports = [];
const RENDER_SCALE = 1.5;

let annotations = [];
let selectedId = null;
let nextId = 1;
let library = [];
let previewMode = false;

// ——— DOM refs ———
const viewer = document.getElementById('pdf-viewer');
const emptyState = document.getElementById('empty-state');
const fileInput = document.getElementById('file-input');
const yamlInput = document.getElementById('yaml-input');

const btnOpen = document.getElementById('btn-open');
const btnText = document.getElementById('btn-text');
const btnSign = document.getElementById('btn-sign');
const btnDate = document.getElementById('btn-date');
const btnDup = document.getElementById('btn-dup');
const btnSave = document.getElementById('btn-save');
const btnLibrary = document.getElementById('btn-library');
const btnExport = document.getElementById('btn-export');
const btnImport = document.getElementById('btn-import');
const btnPreview = document.getElementById('btn-preview');
const btnDownload = document.getElementById('btn-download');

const modalOverlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
const modalFooter = document.getElementById('modal-footer');
const modalCloseBtn = document.getElementById('modal-close');

const toastEl = document.getElementById('toast');

// ——— Dark mode ———
function applyTheme() {
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
}
applyTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

// ——— Toast ———
let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ——— Modal ———
function openModal(title, bodyHTML, footerButtons) {
  closeModal();
  modalTitle.textContent = title;
  modalBody.innerHTML = bodyHTML;
  modalFooter.innerHTML = '';
  (footerButtons || []).forEach(b => {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    btn.className = 'modal-btn ' + (b.cls || '');
    if (b.id) btn.id = b.id;
    btn.onclick = b.onclick;
    modalFooter.appendChild(btn);
  });
  modalOverlay.classList.add('open');
}
function closeModal() { modalOverlay.classList.remove('open'); }
modalCloseBtn.onclick = closeModal;
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

function showConfirm(message, onConfirm) {
  openModal('Confirm', `<p style="font-size:14px;color:var(--text-secondary)">${message}</p>`, [
    { label: 'Cancel', cls: '', onclick: closeModal },
    { label: 'Confirm', cls: 'modal-btn-danger', onclick: () => { closeModal(); onConfirm(); } }
  ]);
}

// ——— Toolbar state ———
function updateToolbar() {
  const loaded = !!pdfDoc;
  btnText.disabled = !loaded;
  btnSign.disabled = !loaded;
  btnDate.disabled = !loaded;
  btnDup.disabled = !loaded;
  btnSave.disabled = !loaded;
  btnExport.disabled = !loaded;
  btnDownload.disabled = !loaded;
}

// ——— PDF Loading ———
btnOpen.onclick = () => fileInput.click();
fileInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  fileInput.value = '';
  pdfFileName = file.name;
  const buf = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({ data: buf }).promise;
  pdfDoc = doc;
  pdfPageViewports.length = 0;
  annotations = [];
  selectedId = null;
  nextId = 1;
  updateToolbar();
  await renderAllPages();
  emptyState.style.display = 'none';
  showToast('PDF loaded — ' + pdfDoc.numPages + ' page(s)');
});

async function renderAllPages() {
  // preserve preview state
  const container = document.createElement('div');
  container.className = 'pdf-container';
  // remove old content (keep empty-state)
  viewer.querySelectorAll('.pdf-container').forEach(c => c.remove());
  viewer.appendChild(container);

  for (let num = 1; num <= pdfDoc.numPages; num++) {
    const page = await pdfDoc.getPage(num);
    const baseVP = page.getViewport({ scale: 1 });
    pdfPageViewports[num] = baseVP;
    const vp = page.getViewport({ scale: RENDER_SCALE });

    const wrapper = document.createElement('div');
    wrapper.className = 'pdf-page-wrapper';

    const pageDiv = document.createElement('div');
    pageDiv.className = 'pdf-page';
    pageDiv.id = 'page-' + num;
    pageDiv.style.width = vp.width + 'px';
    pageDiv.style.height = vp.height + 'px';

    const canvas = document.createElement('canvas');
    canvas.className = 'pdf-canvas';
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = vp.width + 'px';
    canvas.style.height = vp.height + 'px';

    const annLayer = document.createElement('div');
    annLayer.className = 'annotation-layer';
    annLayer.id = 'ann-layer-' + num;

    pageDiv.appendChild(canvas);
    pageDiv.appendChild(annLayer);

    const label = document.createElement('div');
    label.className = 'page-label';
    label.textContent = 'Page ' + num + ' of ' + pdfDoc.numPages;

    wrapper.appendChild(pageDiv);
    wrapper.appendChild(label);
    container.appendChild(wrapper);

    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  }

  // Re-render existing annotations
  annotations.forEach(ann => renderAnnotation(ann));

  // Re-apply preview mode class
  if (previewMode) viewer.classList.add('preview-mode');
  else viewer.classList.remove('preview-mode');
}

// Click on viewer deselects
viewer.addEventListener('mousedown', e => {
  if (e.target.closest('.annotation')) return;
  deselectAll();
});

function deselectAll() {
  selectedId = null;
  document.querySelectorAll('.annotation.selected').forEach(el => el.classList.remove('selected'));
}

// ——— Finding best page for placement ———
function getMostCenteredPage() {
  const viewerRect = viewer.getBoundingClientRect();
  const viewerCenter = viewerRect.top + viewerRect.height / 2;
  let best = 1, bestDist = Infinity;
  for (let n = 1; n <= pdfDoc.numPages; n++) {
    const el = document.getElementById('page-' + n);
    if (!el) continue;
    const r = el.getBoundingClientRect();
    const pageCenter = r.top + r.height / 2;
    const dist = Math.abs(pageCenter - viewerCenter);
    if (dist < bestDist) { bestDist = dist; best = n; }
  }
  return best;
}

function getVisibleCenter(pageNum) {
  const pageEl = document.getElementById('page-' + pageNum);
  const viewerRect = viewer.getBoundingClientRect();
  const pageRect = pageEl.getBoundingClientRect();
  // visible region of the page (in page-local coords)
  const visTop = Math.max(0, viewerRect.top - pageRect.top);
  const visBot = Math.min(pageRect.height, viewerRect.bottom - pageRect.top);
  const visLeft = Math.max(0, viewerRect.left - pageRect.left);
  const visRight = Math.min(pageRect.width, viewerRect.right - pageRect.left);
  return { x: (visLeft + visRight) / 2, y: (visTop + visBot) / 2 };
}

// ——— Annotation CRUD ———
function createAnnotation(type, opts) {
  const page = getMostCenteredPage();
  const center = getVisibleCenter(page);
  const w = opts.w || (type === 'sign' ? 240 : 200);
  const h = opts.h || (type === 'sign' ? 110 : 50);
  const jitterX = (Math.random() - 0.5) * 20;
  const jitterY = (Math.random() - 0.5) * 20;
  let x = Math.max(4, center.x - w / 2 + jitterX);
  let y = Math.max(4, center.y - h / 2 + jitterY);

  const ann = {
    id: nextId++,
    type: type,
    page: page,
    x, y, w, h,
    content: opts.content || null,
    strokes: opts.strokes || null
  };
  annotations.push(ann);
  renderAnnotation(ann);
  selectAnnotation(ann.id);
  return ann;
}

function selectAnnotation(id) {
  deselectAll();
  selectedId = id;
  const el = document.getElementById('ann-' + id);
  if (el) el.classList.add('selected');
}

function deleteAnnotation(id) {
  annotations = annotations.filter(a => a.id !== id);
  const el = document.getElementById('ann-' + id);
  if (el) el.remove();
  if (selectedId === id) selectedId = null;
}

function duplicateAnnotation(id) {
  const src = annotations.find(a => a.id === id);
  if (!src) return;
  const ann = {
    id: nextId++,
    type: src.type,
    page: src.page,
    x: src.x + 18,
    y: src.y + 18,
    w: src.w,
    h: src.h,
    content: src.content,
    strokes: src.strokes ? src.strokes.map(s => s.map(p => ({ ...p }))) : null
  };
  annotations.push(ann);
  renderAnnotation(ann);
  selectAnnotation(ann.id);
  showToast('Annotation duplicated');
}

// ——— Render annotation DOM ———
function renderAnnotation(ann) {
  const layer = document.getElementById('ann-layer-' + ann.page);
  if (!layer) return;

  // Remove if already rendered
  const existing = document.getElementById('ann-' + ann.id);
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.className = 'annotation' + (ann.id === selectedId ? ' selected' : '');
  el.id = 'ann-' + ann.id;
  el.style.left = ann.x + 'px';
  el.style.top = ann.y + 'px';
  el.style.width = ann.w + 'px';
  el.style.height = ann.h + 'px';
  el.style.display = 'flex';
  el.style.flexDirection = 'column';

  // Header
  const header = document.createElement('div');
  header.className = 'annotation-header';
  const lbl = document.createElement('span');
  if (ann.type === 'text') { lbl.innerHTML = '<i class="fas fa-font"></i> Text'; }
  else { lbl.innerHTML = '<i class="fas fa-signature"></i> Signature'; }
  header.appendChild(lbl);

  const actions = document.createElement('div');
  actions.className = 'annotation-actions';

  const dupBtn = document.createElement('button');
  dupBtn.className = 'ann-btn';
  dupBtn.dataset.action = 'dup';
  dupBtn.innerHTML = '<i class="fas fa-clone"></i>';
  dupBtn.onmousedown = e => { e.stopPropagation(); duplicateAnnotation(ann.id); };

  const saveBtn = document.createElement('button');
  saveBtn.className = 'ann-btn';
  saveBtn.dataset.action = 'save';
  saveBtn.innerHTML = '<i class="fas fa-bookmark"></i>';
  saveBtn.onmousedown = e => { e.stopPropagation(); saveToLibrary(ann.id); };

  const delBtn = document.createElement('button');
  delBtn.className = 'ann-btn del-btn';
  delBtn.dataset.action = 'del';
  delBtn.innerHTML = '<i class="fas fa-xmark"></i>';
  delBtn.onmousedown = e => { e.stopPropagation(); deleteAnnotation(ann.id); };

  actions.appendChild(dupBtn);
  actions.appendChild(saveBtn);
  actions.appendChild(delBtn);
  header.appendChild(actions);
  el.appendChild(header);

  // Content
  if (ann.type === 'text') {
    const textDiv = document.createElement('div');
    textDiv.className = 'text-content';
    textDiv.contentEditable = 'true';
    if (ann.content) textDiv.innerHTML = ann.content;
    textDiv.addEventListener('input', () => { ann.content = textDiv.innerHTML; });
    textDiv.addEventListener('mousedown', e => e.stopPropagation());
    textDiv.addEventListener('touchstart', e => e.stopPropagation());
    el.appendChild(textDiv);
  } else {
    // Signature
    const signArea = document.createElement('div');
    signArea.className = 'sign-area';

    const signCanvas = document.createElement('canvas');
    signCanvas.style.width = '100%';
    signCanvas.style.height = '100%';

    const placeholder = document.createElement('span');
    placeholder.className = 'sign-placeholder';
    placeholder.textContent = 'Draw signature';

    const clearBtn = document.createElement('button');
    clearBtn.className = 'sign-clear';
    clearBtn.textContent = 'Clear';
    clearBtn.addEventListener('mousedown', e => { e.stopPropagation(); });
    clearBtn.addEventListener('click', e => {
      e.stopPropagation();
      ann.strokes = [];
      redrawSignature(signCanvas, ann);
      placeholder.style.display = '';
    });

    signArea.appendChild(signCanvas);
    signArea.appendChild(placeholder);
    signArea.appendChild(clearBtn);
    el.appendChild(signArea);

    // Drawing logic
    setupSignatureCanvas(signCanvas, ann, placeholder);
  }

  // Resize handle
  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'resize-handle';
  el.appendChild(resizeHandle);

  layer.appendChild(el);

  // Setup dragging
  setupDrag(el, ann, header);
  // Setup resize
  setupResize(el, ann, resizeHandle);

  // Click to select
  el.addEventListener('mousedown', e => {
    if (e.target.closest('.ann-btn') || e.target.closest('.sign-clear')) return;
    selectAnnotation(ann.id);
  });
}

// ——— Signature Canvas ———
function setupSignatureCanvas(canvas, ann, placeholder) {
  let drawing = false;
  let currentStroke = [];

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    redrawSignature(canvas, ann);
  }

  const ro = new ResizeObserver(() => resizeCanvas());
  ro.observe(canvas.parentElement);
  setTimeout(resizeCanvas, 60);

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function startDraw(e) {
    e.stopPropagation();
    e.preventDefault();
    drawing = true;
    currentStroke = [getPos(e)];
    if (!ann.strokes) ann.strokes = [];
    placeholder.style.display = 'none';
  }
  function moveDraw(e) {
    if (!drawing) return;
    e.stopPropagation();
    e.preventDefault();
    currentStroke.push(getPos(e));
    drawCurrentStroke(canvas, currentStroke);
  }
  function endDraw(e) {
    if (!drawing) return;
    e.stopPropagation();
    drawing = false;
    if (currentStroke.length > 1) {
      ann.strokes.push(currentStroke);
    }
    currentStroke = [];
    redrawSignature(canvas, ann);
  }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', moveDraw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', moveDraw, { passive: false });
  canvas.addEventListener('touchend', endDraw);

  // Initial draw if strokes exist
  if (ann.strokes && ann.strokes.length > 0) {
    placeholder.style.display = 'none';
  }
}

function drawCurrentStroke(canvas, stroke) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.strokeStyle = '#1a1d24';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // redraw full current stroke path on top
  ctx.beginPath();
  for (let i = 0; i < stroke.length; i++) {
    if (i === 0) ctx.moveTo(stroke[i].x, stroke[i].y);
    else ctx.lineTo(stroke[i].x, stroke[i].y);
  }
  ctx.stroke();
}

function redrawSignature(canvas, ann) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!ann.strokes) return;
  ctx.strokeStyle = '#1a1d24';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ann.strokes.forEach(stroke => {
    if (stroke.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
    ctx.stroke();
  });
}

// ——— Dragging ———
function setupDrag(el, ann, header) {
  let dragging = false, startX, startY, origX, origY;

  function onStart(e) {
    if (e.target.closest('.text-content') || e.target.closest('.sign-area') || e.target.closest('.ann-btn') || e.target.closest('.sign-clear') || e.target.closest('.resize-handle')) return;
    e.preventDefault();
    dragging = true;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX;
    startY = t.clientY;
    origX = ann.x;
    origY = ann.y;
    el.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    let nx = origX + (t.clientX - startX);
    let ny = origY + (t.clientY - startY);
    const layer = document.getElementById('ann-layer-' + ann.page);
    if (layer) {
      nx = Math.max(0, Math.min(nx, layer.clientWidth - ann.w));
      ny = Math.max(0, Math.min(ny, layer.clientHeight - ann.h));
    }
    ann.x = nx;
    ann.y = ny;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  }
  function onEnd() {
    dragging = false;
    el.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
  }

  el.addEventListener('mousedown', onStart);
  el.addEventListener('touchstart', onStart, { passive: false });
}

// ——— Resizing ———
function setupResize(el, ann, handle) {
  let resizing = false, startX, startY, origW, origH;
  function onStart(e) {
    e.preventDefault();
    e.stopPropagation();
    resizing = true;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX;
    startY = t.clientY;
    origW = ann.w;
    origH = ann.h;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  }
  function onMove(e) {
    if (!resizing) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    let nw = Math.max(100, origW + (t.clientX - startX));
    let nh = Math.max(44, origH + (t.clientY - startY));
    ann.w = nw;
    ann.h = nh;
    el.style.width = nw + 'px';
    el.style.height = nh + 'px';
  }
  function onEnd() {
    resizing = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
  }
  handle.addEventListener('mousedown', onStart);
  handle.addEventListener('touchstart', onStart, { passive: false });
}

// ——— YAML Export ———
function yamlEscapeStr(s) {
  if (s === '' || s == null) return '""';
  const special = /[:{}\[\],&*?|><=@%#'"!\n\r\t\\]/;
  if (special.test(s) || s !== s.trim()) {
    const escaped = s.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
    return '"' + escaped + '"';
  }
  return s;
}

function strokesToSVG(strokes, w, h) {
  let paths = '';
  strokes.forEach(stroke => {
    if (stroke.length < 1) return;
    let d = 'M ' + stroke[0].x.toFixed(2) + ' ' + stroke[0].y.toFixed(2);
    for (let i = 1; i < stroke.length; i++) {
      d += ' L ' + stroke[i].x.toFixed(2) + ' ' + stroke[i].y.toFixed(2);
    }
    paths += `<path d="${d}" fill="none" stroke="#1a1d24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  });
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${paths}</svg>`;
}

    }
  });

  const baseName = pdfFileName.replace(/\.pdf$/i, '');

          { label: 'Replace', cls: 'modal-btn-danger', onclick: () => { closeModal(); importAnnotations(parsed, true); } }
        ]

function importAnnotations(parsed, replace) {
  if (replace) {
    annotations.forEach(a => { const el = document.getElementById('ann-' + a.id); if (el) el.remove(); });
    annotations = [];
    selectedId = null;
  }
  parsed.forEach(item => {
    const page = Math.max(1, Math.min(item.page, pdfDoc.numPages));
    const ann = {
      id: nextId++,
      type: item.type,
      page: page,
      x: item.x || 20,
      y: item.y || 20,
      w: item.w || (item.type === 'sign' ? 240 : 200),
      h: item.h || (item.type === 'sign' ? 110 : 50),
      content: item.content || null,
      strokes: item.strokes || null
    };
    annotations.push(ann);
    renderAnnotation(ann);
  });
  showToast('Imported ' + parsed.length + ' annotation(s)');
}

function parseYAML(text) {
  const lines = text.split('\n');
  const result = [];
  let current = null;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    if (trimmed === '' || trimmed.startsWith('#')) continue;
    if (trimmed === '- type: text' || trimmed === '- type: sign') {
      if (current) result.push(current);
      current = { type: trimmed.split(': ')[1] };
      continue;
    }
    if (!current) continue;
    const m = trimmed.match(/^(\w[\w_]*)\s*:\s*(.*)$/);
    if (!m) continue;
    const key = m[1];
    let val = m[2];
    if (key === 'page') current.page = parseInt(val);
    else if (key === 'x') current.x = parseFloat(val);
    else if (key === 'y') current.y = parseFloat(val);
    else if (key === 'w') current.w = parseFloat(val);
    else if (key === 'h') current.h = parseFloat(val);
    else if (key === 'content') current.content = yamlUnescapeStr(val);
    else if (key === 'signature_svg') {
      const svg = yamlUnescapeStr(val);
      current.strokes = svgToStrokes(svg);
    }
  }
  if (current) result.push(current);
  return result;
}

function yamlUnescapeStr(s) {
  s = s.trim();
  if (s.startsWith('"') && s.endsWith('"')) {
    s = s.slice(1, -1);
    s = s.replace(/\\n/g, '\n').replace(/\\r/g, '\r').replace(/\\t/g, '\t').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
  }
  return s;
}

function svgToStrokes(svg) {
  const strokes = [];
  const pathRe = /<path\s+d="([^"]+)"/g;
  let pm;
  while ((pm = pathRe.exec(svg))) {
    const d = pm[1];
    const cmdRe = /([ML])\s+([\d.eE+-]+)\s+([\d.eE+-]+)/g;
    let cm, stroke = [];
    while ((cm = cmdRe.exec(d))) {
      stroke.push({ x: parseFloat(cm[2]), y: parseFloat(cm[3]) });
    }
    if (stroke.length > 0) strokes.push(stroke);
  }
  return strokes;
}

// ——— Download (Flatten) ———
btnDownload.onclick = async () => {
  if (!pdfDoc) return;
  showToast('Generating PDF…');

  const { jsPDF } = window.jspdf;
  let doc = null;

  for (let num = 1; num <= pdfDoc.numPages; num++) {
    const baseVP = pdfPageViewports[num];
    const pageEl = document.getElementById('page-' + num);
    if (!pageEl) continue;

    const pdfCanvas = pageEl.querySelector('.pdf-canvas');
    const w = pdfCanvas.width;
    const h = pdfCanvas.height;

    // Clone canvas
    const outCanvas = document.createElement('canvas');
    outCanvas.width = w;
    outCanvas.height = h;
    const ctx = outCanvas.getContext('2d');
    ctx.drawImage(pdfCanvas, 0, 0);

    // Draw annotations
    const pageAnns = annotations.filter(a => a.page === num);
    pageAnns.forEach(ann => {
      const annEl = document.getElementById('ann-' + ann.id);
      if (!annEl) return;
      const header = annEl.querySelector('.annotation-header');
      const headerH = header ? header.offsetHeight : 28;

      if (ann.type === 'text') {
        // Draw text
        const tmp = document.createElement('div');
        tmp.innerHTML = ann.content || '';
        const plainText = tmp.textContent || '';
        if (!plainText) return;

        ctx.save();
        ctx.font = '16px Inter, sans-serif';
        ctx.fillStyle = '#1a1d24';
        ctx.textBaseline = 'top';

        const maxW = ann.w - 16; // padding
        const lines = wrapText(ctx, plainText, maxW);
        const lineH = 16 * 1.4;
        lines.forEach((line, li) => {
          ctx.fillText(line, ann.x + 8, ann.y + headerH + 6 + li * lineH);
        });
        ctx.restore();
      } else {
        // Draw strokes
        if (!ann.strokes || ann.strokes.length === 0) return;
        ctx.save();
        ctx.strokeStyle = '#1a1d24';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ann.strokes.forEach(stroke => {
          if (stroke.length < 2) return;
          ctx.beginPath();
          ctx.moveTo(ann.x + stroke[0].x, ann.y + headerH + stroke[0].y);
          for (let i = 1; i < stroke.length; i++) {
            ctx.lineTo(ann.x + stroke[i].x, ann.y + headerH + stroke[i].y);
          }
          ctx.stroke();
        });
        ctx.restore();
      }
    });

    const imgData = outCanvas.toDataURL('image/png');
    const pw = baseVP.width;
    const ph = baseVP.height;

    if (num === 1) {
      doc = new jsPDF({ unit: 'pt', format: [pw, ph] });
    } else {
      doc.addPage([pw, ph]);
    }
    doc.addImage(imgData, 'PNG', 0, 0, pw, ph);
  }

  if (doc) {
    const baseName = pdfFileName.replace(/\.pdf$/i, '');
    doc.save(baseName + '-signed.pdf');
    showToast('PDF downloaded');
  }
};

function wrapText(ctx, text, maxWidth) {
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

// ——— Keyboard Shortcuts ———
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName.toLowerCase();
  const isEditing = document.activeElement.isContentEditable || tag === 'input' || tag === 'textarea';

  // Escape
  if (e.key === 'Escape') {
    closeModal();
    deselectAll();
    return;
  }

  // Ctrl/Cmd + D → duplicate
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
    e.preventDefault();
    if (selectedId) duplicateAnnotation(selectedId);
    return;
  }

  if (isEditing) return;

  // Delete / Backspace
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId) {
    e.preventDefault();
    deleteAnnotation(selectedId);
    return;
  }

  // P → preview
  if (e.key === 'p' || e.key === 'P') {
    togglePreview();
  }
});

// ——— Utility ———
function downloadFile(content, name, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Initialize toolbar state
updateToolbar();
</script>

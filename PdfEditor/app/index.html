<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocuSign PDF Annotator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- Hidden file inputs -->
<input type="file" id="file-input" accept=".pdf" hidden/>
<input type="file" id="yaml-input" accept=".yaml,.yml" hidden/>

<!-- Toolbar -->
<div class="toolbar">
  <div class="brand">DocuSign</div>
  <div class="divider"></div>
  <button id="btn-open" class="accent-btn"><i class="fas fa-folder-open"></i><span class="label">Open PDF</span></button>
  <div class="divider"></div>
  <button id="btn-text" disabled><i class="fas fa-font"></i><span class="label">Text</span></button>
  <button id="btn-sign" disabled><i class="fas fa-signature"></i><span class="label">Sign</span></button>
  <button id="btn-date" disabled><i class="fas fa-calendar-day"></i><span class="label">Date</span></button>
  <div class="divider"></div>
  <button id="btn-dup" disabled><i class="fas fa-clone"></i><span class="label">Duplicate</span></button>
  <button id="btn-save" disabled><i class="fas fa-bookmark"></i><span class="label">Save</span></button>
  <button id="btn-library"><i class="fas fa-book"></i><span class="label">Library</span></button>
  <div class="divider"></div>
  <button id="btn-export" disabled><i class="fas fa-file-export"></i><span class="label">Export Ann.</span></button>
  <button id="btn-import"><i class="fas fa-file-import"></i><span class="label">Import Ann.</span></button>
  <div class="divider"></div>
  <button id="btn-preview"><i class="fas fa-eye"></i><span class="label">Preview</span></button>
  <div class="spacer"></div>
  <button id="btn-download" disabled class="accent-btn"><i class="fas fa-download"></i><span class="label">Download</span></button>
</div>

<!-- Main viewer -->
<div class="pdf-viewer" id="pdf-viewer">
  <div class="empty-state" id="empty-state">
    <i class="fas fa-file-pdf"></i>
    <h2>No PDF Loaded</h2>
    <p>Click "Open PDF" to get started with annotations and signatures.</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>

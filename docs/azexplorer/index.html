<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Storage Explorer</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Azure SDK & MSAL via CDN -->
    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
</head>
<body>
    <!-- Top toolbar -->
    <header id="toolbar">
        <div class="toolbar-left">
            <svg class="app-icon" viewBox="0 0 24 24" width="24" height="24"><rect x="3" y="3" width="7" height="7" rx="1" fill="#0078d4"/><rect x="14" y="3" width="7" height="7" rx="1" fill="#50e6ff"/><rect x="3" y="14" width="7" height="7" rx="1" fill="#50e6ff"/><rect x="14" y="14" width="7" height="7" rx="1" fill="#0078d4"/></svg>
            <h1>Azure Storage Explorer</h1>
        </div>
        <div class="toolbar-actions">
            <button id="btn-add-account" title="Add Account">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                Add Account
            </button>
            <button id="btn-import-creds" title="Import Credentials">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 16V4m0 12l-4-4m4 4l4-4M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Import
            </button>
            <button id="btn-export-creds" title="Export Credentials">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 4v12m0-12l-4 4m4-4l4 4M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Export
            </button>
        </div>
    </header>

    <div id="main-layout">
        <!-- Sidebar: account tree -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <span>Storage Accounts</span>
            </div>
            <div id="account-tree" class="tree"></div>
        </aside>

        <!-- Resize handle -->
        <div id="sidebar-resize-handle"></div>

        <!-- Content area -->
        <main id="content">
            <!-- Breadcrumb -->
            <nav id="breadcrumb" class="breadcrumb">
                <span class="breadcrumb-placeholder">Select a storage account to begin</span>
            </nav>

            <!-- Action bar for current view -->
            <div id="action-bar">
                <div class="action-bar-left">
                    <button id="btn-refresh" class="action-btn" title="Refresh" disabled>
                        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M4 12a8 8 0 0114.93-4M20 12a8 8 0 01-14.93 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 4v4h-4M4 20v-4h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Refresh
                    </button>
                    <button id="btn-download" class="action-btn" title="Download selected" disabled>
                        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Download
                    </button>
                    <button id="btn-download-folder" class="action-btn" title="Download folder" disabled>
                        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 11v5m0 0l-2-2m2 2l2-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Download Folder
                    </button>
                    <span class="action-separator"></span>
                    <button id="btn-view-blocks" class="action-btn" title="View block list for selected blob" disabled>
                        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M4 6h16M4 10h16M4 14h10M4 18h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        Block List
                    </button>
                    <button id="btn-commit-folder" class="action-btn" title="Commit blocks for all zero-length blobs in current folder" disabled>
                        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                        Commit Folder
                    </button>
                </div>
                <div class="action-bar-right">
                    <input type="text" id="filter-input" placeholder="Filter by name..." disabled>
                </div>
            </div>

            <!-- File listing table -->
            <div id="file-list-container">
                <table id="file-list">
                    <thead>
                        <tr>
                            <th class="col-check"><input type="checkbox" id="select-all"></th>
                            <th class="col-name sortable" data-sort="name">Name <span class="sort-indicator"></span></th>
                            <th class="col-size sortable" data-sort="size">Size <span class="sort-indicator"></span></th>
                            <th class="col-modified sortable" data-sort="modified">Last Modified <span class="sort-indicator"></span></th>
                            <th class="col-type sortable" data-sort="type">Content Type <span class="sort-indicator"></span></th>
                        </tr>
                    </thead>
                    <tbody id="file-list-body">
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state">
                    <svg viewBox="0 0 24 24" width="48" height="48"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke="#999" stroke-width="1.5" fill="none"/></svg>
                    <p>No items to display</p>
                </div>
                <div id="loading-state" class="loading-state" style="display:none;">
                    <div class="spinner"></div>
                    <p>Loading...</p>
                </div>
            </div>

            <!-- Status bar -->
            <div id="status-bar">
                <span id="status-text">Ready</span>
                <span id="status-count"></span>
            </div>
        </main>
    </div>

    <!-- Modal: Add Account -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div id="modal" class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Add Account</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Filled dynamically -->
            </div>
        </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file-input" accept=".json" style="display:none;">

    <!-- Toast notification -->
    <div id="toast-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps</title>
    <style>
        :root {
            --color-primary: #0078d4;
            --color-primary-hover: #106ebe;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-border: #e0e0e0;
            --color-text: #1b1b1b;
            --color-text-secondary: #616161;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
        }

        header {
            background: var(--color-primary);
            color: #fff;
            padding: 24px 32px;
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        header p {
            font-size: 14px;
            opacity: 0.85;
        }

        .container {
            max-width: 960px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .search-bar {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
            background: var(--color-surface);
            margin-bottom: 24px;
        }

        .search-bar:focus {
            border-color: var(--color-primary);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .app-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
            cursor: pointer;
        }

        .app-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 4px 16px rgba(0, 120, 212, 0.12);
            transform: translateY(-2px);
        }

        .app-card .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-card .card-icon {
            font-size: 28px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f6ff;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .app-card .card-title {
            font-size: 16px;
            font-weight: 600;
        }

        .app-card .card-description {
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        .app-card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .app-card .tag {
            font-size: 11px;
            padding: 2px 8px;
            background: #eef2f7;
            color: var(--color-text-secondary);
            border-radius: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--color-text-secondary);
            font-size: 14px;
            display: none;
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: var(--color-text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <h1>Apps</h1>
        <p>Select an application to launch</p>
    </header>

    <div class="container">
        <input type="text" class="search-bar" id="search" placeholder="Search apps..." autofocus>

        <div class="app-grid" id="app-grid"></div>
        <div class="empty-state" id="empty-state">No apps match your search.</div>
    </div>

    <footer id="footer"></footer>

    <script>
        let apps = [];

        async function loadApps() {
            try {
                const resp = await fetch('apps.json');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                apps = await resp.json();
            } catch (e) {
                console.error('Failed to load apps.json:', e);
                apps = [];
            }
            renderApps(apps);
            document.getElementById('footer').textContent = `${apps.length} app${apps.length !== 1 ? 's' : ''} available`;
        }

        function renderApps(list) {
            const grid = document.getElementById('app-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '';

            if (list.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            for (const app of list) {
                const card = document.createElement('a');
                card.className = 'app-card';
                card.href = app.path;

                const tags = (app.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon">${app.icon || '📦'}</div>
                        <div class="card-title">${escapeHtml(app.name)}</div>
                    </div>
                    <div class="card-description">${escapeHtml(app.description || '')}</div>
                    <div class="card-tags">${tags}</div>
                `;
                grid.appendChild(card);
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Search / filter
        document.getElementById('search').addEventListener('input', e => {
            const q = e.target.value.trim().toLowerCase();
            if (!q) {
                renderApps(apps);
                return;
            }
            const filtered = apps.filter(app =>
                app.name.toLowerCase().includes(q) ||
                (app.description || '').toLowerCase().includes(q) ||
                (app.tags || []).some(t => t.toLowerCase().includes(q))
            );
            renderApps(filtered);
        });

        loadApps();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Extractor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>🍪 Cookie Extractor</h1>
    <p id="site-url" class="site-url"></p>

    <div class="stats">
      <span id="cookie-count">0 cookies found</span>
    </div>

    <div class="button-row">
      <button id="btn-copy" title="Copy to clipboard">📋 Copy</button>
      <button id="btn-download" title="Download as file">💾 Download</button>
    </div>

    <textarea id="cookie-output" readonly placeholder="No cookies found for this site."></textarea>

    <p id="status-msg" class="status-msg"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
